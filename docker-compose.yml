services:
  # ==================== 基础设施层 ====================
  mysql:
    image: mysql:8.0
    container_name: st-mysql
    environment:
      MYSQL_ROOT_PASSWORD: silvertongue_root
      MYSQL_DATABASE: silvertongue
      MYSQL_USER: st_user
      MYSQL_PASSWORD: st_pass_2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: st-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: silvertongue
      MINIO_ROOT_PASSWORD: silvertongue_minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: st-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: st-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: SilverTongueKafkaCluster01
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== 业务服务层 ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: st-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: silvertongue
      MYSQL_USER: st_user
      MYSQL_PASSWORD: st_pass_2026
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_URIS: http://elasticsearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: silvertongue
      MINIO_SECRET_KEY: silvertongue_minio
      GRPC_AGENT_HOST: ai-agent
      GRPC_AGENT_PORT: 50051
      JWT_SECRET: SilverTongue_JWT_Secret_Key_2026_Very_Long_And_Secure
      WECHAT_APP_ID: wx_demo_id
      WECHAT_APP_SECRET: wx_demo_secret
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: st-ai-agent
    ports:
      - "50051:50051"   # gRPC
      - "8089:8089"     # FastAPI health/metrics
    environment:
      REDIS_URL: redis://redis:6379/3
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      ES_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # ---- Model Router (多模型路由) ----
      # 方式 A: 逐个配置
      LLM_API_KEY: ""                          # OpenAI / 通用 text-only
      LLM_BASE_URL: "https://api.openai.com/v1"
      LLM_MODEL: "gpt-4o"
      QWEN_OMNI_API_KEY: ""                    # Qwen2.5-Omni (voice-native)
      QWEN_OMNI_ENDPOINT: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      QWEN_OMNI_MODEL: "qwen2.5-omni"
      DEEPSEEK_API_KEY: "sk-46a31dc5807046e0bdef7d369365d724" # DeepSeek (text-only, cheap)
      DEEPSEEK_MODEL: "deepseek-chat"
      LOCAL_MODEL_ENDPOINT: "http://localhost:11434"  # Ollama / vLLM
      LOCAL_MODEL_NAME: "qwen2.5:72b"
      LOCAL_MIN_VRAM_GB: "200"
      # ---- STT / TTS ----
      STT_MODEL_SIZE: "large-v3"               # faster-whisper 模型尺寸
      STT_API_KEY: ""                          # 远端 Whisper API key (fallback)
      TTS_VOICE: "en-US-AriaNeural"            # edge-tts 默认音色
      # ---- MFA ----
      MFA_ENABLED: "false"
    depends_on:
      - redis
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: st-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ==================== 监控层 ====================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: st-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - ai-agent

  grafana:
    image: grafana/grafana:11.1.0
    container_name: st-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: silvertongue
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  minio_data:
  es_data:
  grafana_data:
