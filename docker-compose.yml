services:
  mysql:
    image: mysql:8.0
    container_name: st-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-silvertongue_root}
      MYSQL_DATABASE: ${MYSQL_DB:-silvertongue}
      MYSQL_USER: ${MYSQL_USER:-st_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-st_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: st-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-silvertongue}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-silvertongue_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: st-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: st-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: SilverTongueKafkaCluster01
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: st-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-silvertongue}
      MYSQL_USER: ${MYSQL_USER:-st_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-st_pass_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_URIS: http://elasticsearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-silvertongue}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-silvertongue_minio}
      GRPC_AGENT_HOST: ai-agent
      GRPC_AGENT_PORT: 50051
      AI_AGENT_BASE_URL: http://ai-agent:8089
      JWT_SECRET: ${JWT_SECRET:-change-me-in-.env}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-wx_demo_id}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-wx_demo_secret}
      WECHAT_REDIRECT_BASE_URL: ${WECHAT_REDIRECT_BASE_URL:-http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_started

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: st-ai-agent
    ports:
      - "50051:50051"
      - "8089:8089"
    environment:
      REDIS_URL: redis://redis:6379/3
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      ES_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BACKEND_URL: http://backend:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-silvertongue}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-silvertongue_minio}
      MINIO_BUCKET: st-materials
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      QWEN_OMNI_API_KEY: ${QWEN_OMNI_API_KEY:-}
      QWEN_OMNI_ENDPOINT: ${QWEN_OMNI_ENDPOINT:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_OMNI_MODEL: ${QWEN_OMNI_MODEL:-qwen2.5-omni}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      LOCAL_MODEL_ENDPOINT: ${LOCAL_MODEL_ENDPOINT:-http://localhost:11434}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-qwen2.5:72b}
      LOCAL_MIN_VRAM_GB: ${LOCAL_MIN_VRAM_GB:-200}
      STT_MODEL_SIZE: ${STT_MODEL_SIZE:-large-v3}
      STT_API_KEY: ${STT_API_KEY:-}
      STT_AI_API_KEY: ${STT_AI_API_KEY:-}
      STT_FORCE_API: ${STT_FORCE_API:-false}
      TTS_VOICE: ${TTS_VOICE:-en-US-AriaNeural}
      TTS_USE_FREETTS: ${TTS_USE_FREETTS:-false}
      TTS_AI_API_KEY: ${TTS_AI_API_KEY:-}
      TTS_AI_BASE_URL: ${TTS_AI_BASE_URL:-https://tts.ai/v1}
      TTS_AI_MODEL: ${TTS_AI_MODEL:-kokoro}
      TTS_AI_VOICE: ${TTS_AI_VOICE:-af_bella}
      MFA_ENABLED: ${MFA_ENABLED:-false}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastasia}
    depends_on:
      - redis
      - kafka
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: st-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: st-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - ai-agent

  grafana:
    image: grafana/grafana:11.1.0
    container_name: st-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-silvertongue}
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  minio_data:
  es_data:
  grafana_data:
