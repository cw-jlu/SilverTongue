global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Spring Boot Actuator (Micrometer Prometheus)
  - job_name: 'silvertongue-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'backend'

  # Python Agent (prometheus_client)
  - job_name: 'silvertongue-ai-agent'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-agent:8089']
        labels:
          service: 'ai-agent'
