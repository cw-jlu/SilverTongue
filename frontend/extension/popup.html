<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilverTongue Harvester</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a6e3a1, #89b4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .info {
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 16px;
    }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn-secondary {
      background: #313244;
      color: #cdd6f4;
    }
    .token-section { margin-top: 16px; border-top: 1px solid #45475a; padding-top: 12px; }
    .token-section label { font-size: 12px; color: #a6adc8; }
    .token-section input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #45475a;
      border-radius: 8px;
      background: #313244;
      color: #cdd6f4;
      font-size: 12px;
    }
    .status { margin-top: 8px; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <h1>🎙️ SilverTongue</h1>
  <p class="info">在 YouTube / Netflix 播放页面自动激活采集按钮，或点击下方打开平台。</p>

  <div class="btn-row">
    <button class="btn-primary" id="open-youtube">▶ YouTube</button>
    <button class="btn-secondary" id="open-app">📖 打开平台</button>
  </div>

  <div class="token-section">
    <label>JWT Token（登录后填写以关联账号）</label>
    <input type="text" id="token-input" placeholder="粘贴从 SilverTongue 获取的 Token">
    <button class="btn-primary" id="save-token" style="margin-top:8px;width:100%">💾 保存</button>
    <div class="status" id="token-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
