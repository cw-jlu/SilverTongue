<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilverTongue Harvester</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    p {
      margin: 0 0 12px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }
    code {
      padding: 1px 4px;
      border-radius: 6px;
      background: #1e293b;
      color: #f8fafc;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin: 14px 0;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: #ffffff;
    }
    .btn-secondary {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 12px;
    }
    .status {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      color: #34d399;
    }
  </style>
</head>
<body>
  <h1>SilverTongue Harvester</h1>
  <p>当前版本支持从 YouTube 页面直接提交片段到 SilverTongue。</p>
  <p>登录 <code>http://localhost:3000/login</code> 后，在页面控制台执行 <code>localStorage.getItem('token')</code>，把结果粘贴到下面保存即可。</p>

  <div class="btn-row">
    <button class="btn-primary" id="open-youtube">打开 YouTube</button>
    <button class="btn-secondary" id="open-app">打开平台</button>
  </div>

  <label for="token-input">JWT Token</label>
  <input id="token-input" type="text" placeholder="Paste token from SilverTongue">
  <button class="btn-primary" id="save-token" style="margin-top: 10px;">保存 Token</button>
  <div class="status" id="token-status"></div>

  <script src="popup.js"></script>
</body>
</html>
