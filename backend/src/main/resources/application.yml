server:
  port: 8080

spring:
  application:
    name: silvertongue-backend

  # ===== Multipart 上传限制 =====
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ===== MySQL =====
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:silvertongue}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:st_user}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

    elasticsearch:
      uris: ${ES_URIS:http://localhost:9201}

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== MinIO =====
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:silvertongue}
  secret-key: ${MINIO_SECRET_KEY:}
  buckets:
    materials: st-materials
    recordings: st-recordings
    ai-voices: st-ai-voices
    transcripts: st-transcripts
    assets: st-assets

# ===== gRPC Agent 连接 =====
grpc:
  agent:
    host: ${GRPC_AGENT_HOST:localhost}
    port: ${GRPC_AGENT_PORT:50051}

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000  # 24 小时 (毫秒)

# ===== WeChat OAuth2 =====
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  redirect-base-url: ${WECHAT_REDIRECT_BASE_URL:}
  oauth2:
    authorize-url: https://open.weixin.qq.com/connect/qrconnect
    access-token-url: https://api.weixin.qq.com/sns/oauth2/access_token
    user-info-url: https://api.weixin.qq.com/sns/userinfo

# ===== Actuator + Prometheus 监控 (从第一天就暴露) =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    elasticsearch:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
